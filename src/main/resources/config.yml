    max: 8          # Tối đa 8 khối trong 1 mạch

  NETHER_GOLD_ORE:
    enabled: true   # Quặng Vàng Nether - bật/tắt gen thêm quặng này
    min: 8          # Tối thiểu 8 khối trong 1 mạch
    max: 16         # Tối đa 16 khối trong 1 mạch

  NETHER_QUARTZ_ORE:
    enabled: true   # Quặng Thạch Anh Nether - bật/tắt gen thêm quặng này
    min: 8          # Tối thiểu 8 khối trong 1 mạch
    max: 16         # Tối đa 16 khối trong 1 mạch

  ANCIENT_DEBRIS:
    enabled: true   # Mảnh Vụn Cổ Đại (Netherite) - bật/tắt gen thêm quặng này
    min: 1          # Tối thiểu 1 khối trong 1 mạch
    max: 3          # Tối đa 3 khối trong 1 mạch
