# ==============================
#       OreDoubler - Config
#       Tác giả: VennLMAO
#       Phiên bản: 1.0.0
# ==============================
#
# ⚠️ QUAN TRỌNG: Phải xóa thư mục world, world_nether, world_the_end
# rồi mới khởi động lại server để quặng gen nhiều hơn trong thế giới mới.
#
# Giải thích các thuộc tính:
#   enabled - true/false: bật hoặc tắt gen thêm quặng này
#   min     - Số khối quặng tối thiểu trong 1 mạch quặng
#   max     - Số khối quặng tối đa trong 1 mạch quặng
#
# Vị trí xuất hiện của quặng giữ nguyên như Minecraft bình thường.
# Chỉ kích thước mạch quặng (min/max) là được tăng lên.

ores:

  COAL_ORE:
    enabled: true   # Quặng Than - bật/tắt gen thêm quặng này
    min: 8          # Tối thiểu 8 khối trong 1 mạch
    max: 16         # Tối đa 16 khối trong 1 mạch

  IRON_ORE:
    enabled: true   # Quặng Sắt - bật/tắt gen thêm quặng này
    min: 8          # Tối thiểu 8 khối trong 1 mạch
    max: 16         # Tối đa 16 khối trong 1 mạch

